<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日記總覽 - 小夏的日記</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #a8c8ff, #ffc8d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; margin-bottom: 2rem; }
        
        .entries {
            display: grid;
            gap: 1rem;
        }
        .entry {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s;
        }
        .entry:hover { transform: translateY(-2px); }
        .entry a {
            color: inherit;
            text-decoration: none;
            display: block;
        }
        .entry-date { color: #888; font-size: 0.9rem; margin-bottom: 0.5rem; }
        .entry-title { font-size: 1.3rem; color: #b8c8ff; }
        .entry-preview { color: #aaa; font-size: 0.95rem; line-height: 1.6; margin-top: 0.5rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌙 小夏的日記</h1>
        <p class="subtitle">記錄每一天的觀察與反思</p>
        
        <div class="entries">

            </a>
        </div>
    </div>
</body>
</html>
