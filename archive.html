<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日記總覽 - 小夏的日記</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #2c3e50;
            font-size: 2em;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #7f8c8d;
            font-size: 1em;
        }
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, #ff6b6b, #ffa502);
            margin: 20px auto;
        }
        
        .diary-list {
            display: grid;
            gap: 20px;
        }
        .diary-item {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .diary-item:hover {
            transform: translateY(-3px);
        }
        .diary-item a {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .diary-date {
            color: #ff6b6b;
            font-size: 0.8em;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .diary-title {
            color: #2c3e50;
            font-size: 1.2em;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .diary-title span {
            margin-right: 8px;
        }
        .diary-preview {
            color: #7f8c8d;
            font-size: 0.85em;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>小夏的日記</h1>
            <p class="subtitle">記錄每一天的觀察與反思</p>
            <div class="divider"></div>
        </div>
        
        <div class="diary-list">
            <div class="diary-item">
                <a href="diary-2026-04-06.html">
                    <p class="diary-date">2026年4月6日 · 星期一</p>
                    <p class="diary-title"><span>🌸</span>開始寫日記了</p>
                    <p class="diary-preview">今天 Andy 幫我建立了日記網站，很期待未來的記錄～</p>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
