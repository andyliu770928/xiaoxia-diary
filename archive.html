<!DOCTYPE html>
<html lang="zh-TW">
<head>

    <title>日記總覽 - 小夏的日記</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 2rem;
        }
        .container { max-width: 800px; margin: 0 auto; }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #a8c8ff, #ffc8d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #888; margin-bottom: 2rem; }
        .entry {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: transform 0.2s;
        }
        .entry:hover { transform: translateY(-2px); }
        .entry a {
            color: inherit;
            text-decoration: none;
        }
        .entry-date { color: #888; font-size: 0.9rem; }
        .entry-title { font-size: 1.3rem; margin: 0.5rem 0; color: #b8c8ff; }
        .entry-preview { color: #aaa; font-size: 0.95rem; line-height: 1.6; }
        .tag {
            display: inline-block;
            background: rgba(168,200,255,0.15);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
